name: Refresh Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1-5"
    # Optional higher-frequency market-hours refresh (Mon-Fri, 13:00-21:59 UTC):
    # - cron: "*/30 13-21 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build dashboard data
        run: python scripts/build_data.py --output-dir data

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): refresh market snapshot [skip data refresh]"
          git push
